services:
  - type: web
    name: PWII-ProyectoDjango
    env: python
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput"
    startCommand: "gunicorn luxor_project.wsgi:application"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: luxor_project.settings